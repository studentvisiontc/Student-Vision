<!DOCTYPE html>
<html>
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
body {
    margin: 0;
    padding: 0;
    /* ఫాంట్ Arial నుండి Roboto Slab కి మార్చబడింది */
    font-family: 'Roboto Slab', serif; 
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}
header {
    background: #00008B;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 20px;
    font-weight: bold;
    color: white;
    width: 100%;
    position: relative;
    box-sizing: border-box;
    overflow: hidden; 
}

/* ---------------------------------------------------- */
/* NEW SCROLLING BACKGROUND ELEMENT */
/* ---------------------------------------------------- */
.header-scroll-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 400%; /* నిరంతర స్క్రోలింగ్ కోసం వెడల్పు 400% కి పెంచబడింది */
    height: 100%;
    background: linear-gradient(to right, 
        transparent 0%, 
        rgba(255, 255, 255, 0.2) 5%, 
        rgba(255, 255, 255, 0.6) 10%, /* గ్లో తీవ్రత పెంచబడింది */
        rgba(255, 255, 255, 0.1) 15%, 
        transparent 20%
    );
    z-index: 1;
    animation: scrollGlow 25s linear infinite; /* వేగం 20s నుండి 25s కి తగ్గించబడింది */
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.7); /* గ్లో షాడో పెంచబడింది */
    opacity: 0.9; /* మరింత స్పష్టంగా కనిపించడానికి */
}

@keyframes scrollGlow {
    0% {
        transform: translateX(-100%); /* కుడి అంచు వెలుపల నుండి ప్రారంభం */
    }
    100% {
        transform: translateX(25%); /* ఎడమ వైపుకు పూర్తి స్క్రోల్ */
    }
}
/* ---------------------------------------------------- */

/* Z-Index ను లోగోలు/టెక్స్ట్ కోసం పెంచండి, తద్వారా అవి గ్లో పైన కనిపిస్తాయి */
header .header-left, header .header-right, .header-corner, .header-corner-right {
    z-index: 10;
}

header .header-left {
    display: flex;
    align-items: center;
    gap: 20px; /* <-- లోగో మరియు టెక్స్ట్ మధ్య గ్యాప్ */
    z-index: 10;
}
header .logo {
    height: 50px;
    border-radius: 50%;
    border: 3px solid #ffffff;
    box-shadow:
        0 0 12px rgba(255,255,255,0.95),
        0 0 18px rgba(0,0,0,0.7);
    background: radial-gradient(circle, #e8f1ff 20%, #b0c9ff 80%);
}

/* Center Text Block (Desktop Style) - తొలగించబడింది */
.header-text-center {
    /* స్థానం మరియు సెంటరింగ్ CSS తొలగించబడింది */
}
/* .header-text-center span తొలగించబడింది */


header .header-right {
    display: flex;
    gap: 25px;
    align-items: center;
    transform: translateX(-12px);
    z-index: 10;
}
header .icon {
    font-size: 20px;
    cursor: pointer;
    color: orange;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
    transition: transform 0.2s, opacity 0.2s;
}
header .icon:hover {
    transform: scale(1.15);
    opacity: 0.8;
    color: orange;
}
footer {
    background: #00008B; 
    color: white;
    padding: 25px 25px 10px 25px;
    text-align: center;
    font-size: 16px;
    width: 100%;
    margin-top: auto;
    box-sizing: border-box;
}
.footer-content {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto 20px auto;
    text-align: left;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
}
.footer-column h4 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 10px;
    color: #ffeb3b;
    /* ఇక్కడ అండర్‌లైన్ జోడించబడింది */
    border-bottom: 2px solid #ffeb3b; 
    padding-bottom: 5px;
}
.footer-column a, .footer-column p {
    display: block;
    margin-bottom: 5px;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.8);
    text-decoration: none;
    transition: color 0.2s;
}
.footer-column a:hover {
    color: #ffeb3b;
}
/* డెస్క్‌టాప్‌లో లోగోలను ఒకే వరుసలో, ఎడమవైపు అలైన్ చేయడానికి కొత్త CSS */
.social-icons {
    display: flex; /* ఒకే వరుసలో ఉంచడానికి */
    gap: 15px; /* ఐకాన్‌ల మధ్య ఖాళీ */
    justify-content: flex-start; /* డెస్క్‌టాప్‌లో ఎడమవైపు అలైన్మెంట్ */
    align-items: center;
}
.social-icons a {
    font-size: 20px; /* డెస్క్‌టాప్‌లో 24px నుండి 20px కి తగ్గించబడింది */
    color: white;
    transition: color 0.2s, transform 0.2s;
}
.social-icons a:hover {
    color: #ffeb3b;
}
.main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 40px;
    font-weight: bold;
    width: 100%;
}
.header-corner {
    position: absolute;
    top: -5px;
    left: -5px;
    height: 70px;
    pointer-events: none;
    z-index: 10;
}
.header-corner-right {
    position: absolute;
    top: -5px;
    right: -5px;
    height: 70px;
    pointer-events: none;
    z-index: 10;
    transform: scaleX(-1);
}

@media (max-width: 900px) {
    .footer-content {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 600px) {
    header {
        padding: 10px 15px;
        flex-wrap: wrap; 
    }
    
    header .logo {
        height: 40px;
        margin-bottom: 5px;
    }
    
    /* మొబైల్ లో టెక్స్ట్ ను సెంటర్ అలైన్ చేయండి */
    header .title {
        text-align: center;
        width: 100%;
    }

    header .title span {
        text-align: center;
    }

    header .header-left {
        width: 100%; /* పూర్తి వెడల్పు తీసుకోండి */
        justify-content: center; /* కంటెంట్‌ను అడ్డంగా మధ్యలో ఉంచండి */
        flex-direction: column; /* లోగో కిందకు టెక్స్ట్ ను స్టాక్ చేయండి */
        align-items: center; /* నిలువుగా మధ్యలో ఉంచండి */
        order: 1; 
        gap: 5px; /* లోగో మరియు టెక్స్ట్ మధ్య చిన్న గ్యాప్ */
    }

    /* మొబైల్ సెంటరింగ్ ఓవర్రైడ్లను తొలగిస్తుంది, డెస్క్‌టాప్ సెట్టింగ్‌లను ఉపయోగిస్తుంది */
    header .header-right {
        gap: 30px;
        transform: translateX(0); 
        width: 100%;
        justify-content: space-around;
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.5); 
        order: 3; /* ఐకాన్స్ చివరి వరుసలో ఉంటాయి */
    }
    
    header .icon {
        font-size: 18px;
    }

    .header-corner {
        height: 50px;
        top: -5px; 
        left: -5px; 
    }
    .header-corner-right {
        height: 50px;
        top: -5px; 
        right: -5px; 
        transform: scaleX(-1);
    }
    .footer-content {
        grid-template-columns: 1fr;
        text-align: center;
    }
    .footer-column h4 {
        margin-top: 15px;
    }
    .social-icons {
        justify-content: center; /* లోగోలు మొబైల్‌లో మధ్యలో ఉండటానికి */
    }
    /* సోషల్ ఐకాన్ సైజును మరింత తగ్గించబడింది */
    .social-icons a { 
        font-size: 18px; 
    }
}

</style>
</head>
